name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        shell: powershell
        run: |
          choco install cmake ninja nasm mingw openssl -y

      - name: Build
        shell: bash
        run: ./scripts/build.sh Release

      - name: Package
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force dist\api-gateway | Out-Null
          Copy-Item build\api_gateway.exe dist\api-gateway\
          Copy-Item build\*.dll dist\api-gateway\ -ErrorAction SilentlyContinue
          Copy-Item build\src\crypto\*.dll dist\api-gateway\ -ErrorAction SilentlyContinue
          foreach ($dll in @("libssl-4-x64.dll", "libcrypto-4-x64.dll", "libstdc++-6.dll", "libgcc_s_seh-1.dll", "libwinpthread-1.dll")) {
            $cmd = Get-Command $dll -ErrorAction SilentlyContinue
            if ($cmd) { Copy-Item $cmd.Source dist\api-gateway\ -ErrorAction SilentlyContinue }
          }
          Copy-Item -Recurse client-web dist\api-gateway\
          Copy-Item -Recurse docs dist\api-gateway\
          Copy-Item -Recurse service-api\service-cpp\config dist\api-gateway\config
          Copy-Item README.md,README_EN.md,README_PT.md,LICENSE dist\api-gateway\
          Compress-Archive -Path dist\api-gateway\* -DestinationPath dist\api-gateway-windows-x64.zip -Force

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/api-gateway-windows-x64.zip
          generate_release_notes: true
